# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo in Render → New → Blueprint → select render.yaml

databases:
  - name: hideaway57-db
    plan: free
    databaseName: hideaway57
    user: hideaway

services:
  - type: web
    name: hideaway57
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:render
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: hideaway57-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_URL
        value: https://hideaway57.onrender.com
      - key: NEXTAUTH_URL
        value: https://hideaway57.onrender.com
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
